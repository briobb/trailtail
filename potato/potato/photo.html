<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>★ ぽっちゃん写真館 ★</title>

<style>
body{
    margin:0;
    padding:20px;
    background-color:#cfefff;
    background-image:url("images/bg.PNG");
    background-repeat:repeat;
    font-family:"MS PGothic","Osaka",sans-serif;
    color:#003366;
}

.gallery-wrap{
    max-width:800px;
    margin:auto;
    background:#ffffff;
    border:4px double #3399cc;
    padding:20px;
    box-shadow:4px 4px 0 rgba(0,0,0,0.15);
}

h1{
    margin-top:0;
    text-align:center;
    color:#0066cc;
    text-shadow:1px 1px 0 #ffffff, 2px 2px 0 #99ccff;
}

.intro{
    text-align:center;
    background:#eef9ff;
    border:2px solid #99ccff;
    padding:12px;
    margin-bottom:20px;
    line-height:1.7;
    font-weight:bold;
}

.counter{
    text-align:center;
    margin:12px 0 20px;
    color:#0066cc;
    font-size:14px;
}

.photo-table{
    width:100%;
    border-collapse:separate;
    border-spacing:12px;
}

.photo-box{
    width:50%;
    vertical-align:top;
    background:#f8fdff;
    border:2px dashed #66b3ff;
    padding:10px;
    text-align:center;
}

.photo-box img{
    width:100%;
    max-width:300px;
    height:auto;
    border:3px ridge #99ccff;
    background:#ffffff;
}

.caption{
    margin-top:8px;
    font-size:14px;
    line-height:1.5;
    color:#003366;
}

.new{
    color:#ff0000;
    font-weight:bold;
    font-size:12px;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#6699cc;
    font-size:12px;
}

.only2{
    text-align:center;
    font-size:18px;
    color:#ff8a04;
    font-style:italic;
    font-weight:bold;
    margin:18px 0 8px;
    text-shadow:1px 1px white;
}

.only{
    text-align:center;
    font-size:26px;
    font-style:italic;
    font-weight:bold;
    margin:8px 0 18px;
    text-shadow:1px 1px white;
}

.only a{
    color:#ff00ff;
    text-decoration:underline;
}

.only a:hover{
    color:#ff0000;
}

@media(max-width:600px){
    .photo-table,
    .photo-table tbody,
    .photo-table tr,
    .photo-table td{
        display:block;
        width:100%;
        box-sizing:border-box;
    }

    .photo-table{
        border-spacing:0;
    }

    .photo-box{
        margin-bottom:14px;
    }
}
</style>
</head>

<body>

<div class="gallery-wrap">

    <h1>★ ぽっちゃん写真館 ★</h1>

    <div class="intro">
        ここは、ぽっちゃんの写真を集めた<br>
        なつかしのフォトギャラリーです♪<br>
        ゆっくり見ていってくださいね。
    </div>

    <div class="counter">
        ただいまの展示枚数：6枚
    </div>

    <table class="photo-table">
        <tr>
            <td class="photo-box">
                <div class="new">NEW!</div>
                <img src="images/photo01.jpg" alt="ぽっちゃん写真1">
                <div class="caption">
                    おすましぽっちゃん。<br>
                    明日を見つめている凛々しい一面♪
                </div>
            </td>

            <td class="photo-box">
                <img src="images/photo02.jpg" alt="ぽっちゃん写真2">
                <div class="caption">
                    ちょっと眠そうな一枚。<br>
                    ふわふわ感が最高です。
                </div>
            </td>
        </tr>

        <tr>
            <td class="photo-box">
                <img src="images/photo03.jpg" alt="ぽっちゃん写真3">
                <div class="caption">
                    二人は仲良し。
                </div>
            </td>

            <td class="photo-box">
                <img src="images/photo04.jpg" alt="ぽっちゃん写真4">
                <div class="caption">
                    お気に入りの場所で休憩中。<br>
                    まったりタイムです。
                </div>
            </td>
        </tr>

        <tr>
            <td class="photo-box">
                <img src="images/photo05.jpg" alt="ぽっちゃん写真5">
                <div class="caption">
                    散髪してもらってスッキリ！。<br>
                    何か言いたそう…？
                </div>
            </td>

            <td class="photo-box">
                <img src="images/photo06.jpg" alt="ぽっちゃん写真6">
                <div class="caption">
                    今日のベストショット。<br>
                    管理人のお気に入りです♪
                </div>
            </td>
        </tr>
    </table>

    <div class="footer">Since 2026</div>

    <div class="only2">🎵相互リンク募集中です🎵</div>

    <div class="only">
        <a href="top.html">TOPへ戻る</a>
    </div>

</div>

</body>
</html>
