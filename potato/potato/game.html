<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ぽっちゃんゲームコーナー</title>





<style>


.container{
    display:flex;
    flex-direction:column;
    align-items:center;

    gap:24px;

    width:100%;
}

.link-button{
    width:85vw;
    max-width:420px;

    cursor:pointer;

    transition:transform 0.15s;
}

.link-button:active{
    transform:scale(0.97);
}

a{
    text-decoration:none;
}







* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: "MS PGothic", "Osaka", sans-serif;
  background-image: url("images/bg.PNG");
  background-repeat: repeat;
  background-size: 160px;
  color: #000;
  text-align: center;
}

.wrapper {
  width: 100%;
  max-width: 430px;
  margin: 0 auto;
  padding: 24px 14px 40px;
}

.rainbow-title {
  font-size: 30px;
  font-weight: bold;
  margin-bottom: 18px;
}

.rainbow-title span:nth-child(1) { color: red; }
.rainbow-title span:nth-child(2) { color: orange; }
.rainbow-title span:nth-child(3) { color: rgb(204, 204, 33); }
.rainbow-title span:nth-child(4) { color: rgb(6, 217, 6); }
.rainbow-title span:nth-child(5) { color: rgb(0, 206, 206); }
.rainbow-title span:nth-child(6) { color: blue; }
.rainbow-title span:nth-child(7) { color: violet; }
.rainbow-title span:nth-child(8) { color: rgb(210, 37, 199); }

.hero-img {
  width: 2400px;
  max-width: 70%;
  image-rendering: auto;
  margin: 8px auto 18px;
  display: block;
}

.welcome {
  display: inline-block;
  padding: 10px 26px;
  margin: 8px 0 18px;
  color: #00ff66;
  background: radial-gradient(ellipse at center, #ff3333 0%, #990000 70%);
  border-radius: 50%;
  border: 2px solid #660000;
  font-size: 12px;
  letter-spacing: 2px;
  box-shadow: 2px 3px 0 rgba(0,0,0,0.35);
}

.only {
  font-size: 26px;
  color: #ff00ff;
  font-style: italic;
  margin: 18px 0;
  text-shadow: 1px 1px white;
}

.only2 {
  font-size: 18px;
  color: #ff8a04;
  font-style: italic;
  margin: 18px 0;
  text-shadow: 1px 1px white;
}

.counter-area {
  margin-top: 26px;
  font-size: 15px;
  color: blue;
}

.counter {
  display: inline-flex;
  gap: 1px;
  vertical-align: middle;
  margin: 0 4px;
}

.digit {
  width: 16px;
  height: 22px;
  line-height: 22px;
  display: inline-block;
  background: #73d7ff;
  color: #ff3333;
  border: 1px solid #fff;
  font-family: "Courier New", monospace;
  font-size: 20px;
  font-weight: bold;
  box-shadow: inset 0 0 3px #777;
}

.menu {
  margin-top: 30px;
}

.menu a {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 90%;
  max-width: 320px;
  color: blue;
  background: rgba(255,255,255,0.65);
  border: 2px outset #ccc;
  text-decoration: underline;
  font-size: 16px;
}

.blink {
  animation: blink 1s step-start infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

.under-construction{
  max-width: 50%;
  max-height: 100px;
  background:#6b3f1d;
  color:#ffd800;

  font-size:20px;
  font-weight:bold;
  text-align:center;

  padding:12px 16px;
  margin:20px auto;

  border:4px ridge #3b220f;

  text-shadow:
    2px 2px 0 #000,
   -2px 2px 0 #000,
    2px -2px 0 #000,
   -2px -2px 0 #000;

  letter-spacing:2px;
}

</style>
</head>

<body>

<div class="wrapper">

  <div class="rainbow-title">
    <span>ぽっ</span><span>ちゃ</span><span>ん</span><span>ゲ</span><span>ー</span><span>ム</span><span>コー</span><span>ナー</span>
  </div>


  <body>

<div class="container">

        <img class="link-button"
             src="images/game1.png"
             alt="game1">
    </a>

     <a href="../catch/catch-game.html">
        <img class="link-button"
             src="images/game2.png"
             alt="game2">

    <a href="../road/game3.html">game3</a>

 
</div>





    <div class="only2">
    🎵相互リンク募集中です🎵
  </div>

  <div class="only">
   <a href="top.html">TOPへ戻る</a>
</div>

</div>


<script>
const counter = document.getElementById("counter");

// ランダム疑似カウンター
const number = Math.floor(100000 + Math.random() * 899999);

// 固定っぽくしたい場合はこちら
// const number = 128;

String(number).padStart(6, "0").split("").forEach(n => {
  const span = document.createElement("span");
  span.className = "digit";
  span.textContent = n;
  counter.appendChild(span);
});
</script>

</body>
</html>
