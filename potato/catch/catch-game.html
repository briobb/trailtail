<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>ぽっちゃんキャッチ</title>
  <style>
    :root {
      --bg1: #7fd2ff;
      --bg2: #e8fbff;
      --panel: rgba(20, 27, 39, 0.8);
      --panel-border: rgba(255, 255, 255, 0.15);
      --text: #ffffff;
      --accent: #ffd166;
      --danger: #ff6b6b;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      overscroll-behavior: none;
    }

    body {
      display: grid;
      place-items: center;
    }

    #game-shell {
      position: relative;
      width: min(100vw, 100vh * 0.5625);
      height: min(100vh, 100vw / 0.5625);
      max-width: 720px;
      max-height: 1280px;
      aspect-ratio: 9 / 16;
      overflow: hidden;
      background: linear-gradient(180deg, #87dbff 0%, #c7f2ff 65%, #effff6 100%);
      border-radius: 24px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.4);
      touch-action: none;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    #hud {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      pointer-events: none;
    }

    .panel {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 10px 14px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
    }

    #scoreboard {
      display: flex;
      gap: 10px;
      align-items: center;
      min-width: 0;
      flex-wrap: wrap;
    }

    .score-box {
      min-width: 90px;
    }

    .score-label {
      font-size: 12px;
      opacity: 0.78;
      letter-spacing: 0.08em;
    }

    .score-value {
      margin-top: 4px;
      font-size: 24px;
      font-weight: 700;
      line-height: 1;
      color: var(--accent);
    }

    #sound-btn {
      pointer-events: auto;
      border: 0;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      min-width: 110px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
    }

    #sound-btn:active {
      transform: scale(0.98);
    }

    #overlay {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.45));
    }

    #overlay.hidden {
      display: none;
    }

    .overlay-card {
      width: min(92%, 500px);
      background: rgba(10, 18, 30, 0.82);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 24px;
      padding: 28px 22px;
      text-align: center;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .overlay-card h1 {
      margin: 0 0 12px;
      font-size: clamp(26px, 5vw, 42px);
      line-height: 1.1;
    }

    .overlay-card p {
      margin: 8px 0;
      font-size: clamp(14px, 2.8vw, 18px);
      line-height: 1.7;
      opacity: 0.95;
    }

    .highlight {
      color: var(--accent);
      font-weight: 700;
    }

    #start-btn {
      margin-top: 18px;
      border: 0;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 17px;
      font-weight: 700;
      background: var(--accent);
      color: #1c2330;
      cursor: pointer;
      min-width: 180px;
    }

    #start-btn:active {
      transform: scale(0.98);
    }

    @media (max-width: 768px) {
      #game-shell {
        width: 100vw;
        height: 100vh;
        max-width: none;
        max-height: none;
        border-radius: 0;
        border: 0;
      }

      #hud {
        top: 10px;
        left: 10px;
        right: 10px;
      }

      .panel,
      #sound-btn {
        border-radius: 14px;
      }

      .score-box {
        min-width: 86px;
      }

      .score-value {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div id="game-shell" aria-label="ぽっちゃんキャッチ">
    <canvas id="game-canvas" width="720" height="1280"></canvas>

    <div id="hud">
      <div id="scoreboard">
        <div class="panel score-box">
          <div class="score-label">SCORE</div>
          <div id="score" class="score-value">0</div>
        </div>
        <div class="panel score-box">
          <div class="score-label">HI-SCORE</div>
          <div id="high-score" class="score-value">0</div>
        </div>
      </div>
      <button id="sound-btn" type="button">SOUND ON</button>
    </div>

    <div id="overlay">
      <div class="overlay-card">
        <h1>ぽっちゃんキャッチ</h1>
        <p>押している間は<span class="highlight">右へ移動</span>、離すと<span class="highlight">左へ戻る</span>よ。</p>
        <p>骨・ハンバーガーで得点アップ☺️</p>
        <p>とうがらしをキャッチすると-1000点😭</p>
        <p>BRIOを落とす、または<br>レンガに触れるとゲームオーバー！</p>
        <button id="start-btn" type="button">ゲームスタート</button>
      </div>
    </div>

    <audio id="bgm" src="bgm.mp3" loop preload="auto"></audio>
  </div>

  <script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('high-score');
    const soundBtn = document.getElementById('sound-btn');
    const overlay = document.getElementById('overlay');
    const bgm = document.getElementById('bgm');

    const WORLD = {
      width: 720,
      height: 1280,
      floorY: 1160,
      gravity: 0,
      moveRightSpeed: 650,
      moveLeftSpeed: 430,
      playerY: 1045,
      spawnInterval: 0.62,
      maxDelta: 0.033,
      itemFallBase: 330,
      goldenCoinChance: 0.16,
      brickChance: 0.12,
    };

    const ITEM_TYPES = {
      bone:   { score: 50,   mustCatch: false, deadly: false },
      burger: { score: 100,  mustCatch: false, deadly: false },
      chili:  { score: -1000,mustCatch: false, deadly: false },
      coin:   { score: 250,  mustCatch: true,  deadly: false },
      brick:  { score: 0,    mustCatch: false, deadly: true  },
    };

    const playerImg = new Image();
    playerImg.src = 'pocchan.png';

    const images = {
      bone: new Image(),
      burger: new Image(),
      chili: new Image(),
      coin: new Image(),
      brick: new Image(),
    };
    images.burger.src = 'burger.png';
    images.chili.src = 'chili.png';
    images.coin.src = 'coin.png';

    const player = {
      x: 140,
      y: WORLD.playerY,
      w: 140,
      h: 140,
    };

    let items = [];
    let particles = [];
    let pressActive = false;
    let soundEnabled = true;
    let gameStarted = false;
    let gameOver = false;
    let score = 0;
    let highScore = 0;
    let spawnTimer = 0;
    let lastTime = 0;
    let bgOffset = 0;
    let cloudOffset = 0;

    let audioCtx = null;

    function getAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    function unlockAudio() {
      if (!soundEnabled) return;
      const ctx = getAudioContext();
      if (ctx.state === 'suspended') {
        ctx.resume().catch(() => {});
      }
    }

    function playJumpSound() {
      if (!soundEnabled) return;

      const ctx = getAudioContext();
      const now = ctx.currentTime;

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = 'square';
      osc.frequency.setValueAtTime(420, now);
      osc.frequency.exponentialRampToValueAtTime(760, now + 0.22);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.18, now + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.50);

      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.start(now);
      osc.stop(now + 0.52);
    }

    function playItemCatchSound(type) {
      if (!soundEnabled) return;

      const ctx = getAudioContext();
      const now = ctx.currentTime;

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();

      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(2600, now);
      filter.Q.value = 0.8;

      osc.type = 'triangle';

      if (type === 'burger') {
        osc.frequency.setValueAtTime(620, now);
        osc.frequency.exponentialRampToValueAtTime(980, now + 0.10);
      } else if (type === 'chili') {
        osc.frequency.setValueAtTime(700, now);
        osc.frequency.exponentialRampToValueAtTime(520, now + 0.10);
      } else {
        osc.frequency.setValueAtTime(520, now);
        osc.frequency.exponentialRampToValueAtTime(880, now + 0.10);
      }

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.28, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);

      osc.start(now);
      osc.stop(now + 0.18);
    }

    function playCoinCatchSound() {
  if (!soundEnabled) return;

  const ctx = getAudioContext();
  const now = ctx.currentTime;

  const osc1 = ctx.createOscillator();
  const osc2 = ctx.createOscillator();
  const osc3 = ctx.createOscillator();

  const gain1 = ctx.createGain();
  const gain2 = ctx.createGain();
  const gain3 = ctx.createGain();

  osc1.type = 'triangle';
  osc2.type = 'sine';
  osc3.type = 'sine';

  // メインのキラーン音
  osc1.frequency.setValueAtTime(1046, now); // C6
  osc1.frequency.exponentialRampToValueAtTime(1568, now + 0.16); // G6

  // 上に重ねるきらめき
  osc2.frequency.setValueAtTime(1318, now + 0.03); // E6
  osc2.frequency.exponentialRampToValueAtTime(2093, now + 0.18); // C7

  // 最後のキラッ
  osc3.frequency.setValueAtTime(2093, now + 0.10); // C7
  osc3.frequency.exponentialRampToValueAtTime(2637, now + 0.22); // E7

  gain1.gain.setValueAtTime(0.0001, now);
  gain1.gain.exponentialRampToValueAtTime(0.28, now + 0.015);
  gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.24);

  gain2.gain.setValueAtTime(0.0001, now + 0.02);
  gain2.gain.exponentialRampToValueAtTime(0.21, now + 0.05);
  gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);

  gain3.gain.setValueAtTime(0.0001, now + 0.09);
  gain3.gain.exponentialRampToValueAtTime(0.18, now + 0.12);
  gain3.gain.exponentialRampToValueAtTime(0.0001, now + 0.26);

  osc1.connect(gain1);
  osc2.connect(gain2);
  osc3.connect(gain3);

  gain1.connect(ctx.destination);
  gain2.connect(ctx.destination);
  gain3.connect(ctx.destination);

  osc1.start(now);
  osc2.start(now + 0.02);
  osc3.start(now + 0.09);

  osc1.stop(now + 0.25);
  osc2.stop(now + 0.24);
  osc3.stop(now + 0.27);
}

    function playCrashSound() {
      if (!soundEnabled) return;

      const ctx = getAudioContext();
      const now = ctx.currentTime;

      const bufferSize = Math.floor(ctx.sampleRate * 0.55);
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);

      for (let i = 0; i < bufferSize; i++) {
        const t = i / bufferSize;
        const fade = Math.pow(1 - t, 1.8);
        data[i] = (Math.random() * 2 - 1) * fade * 0.9;
      }

      const noise = ctx.createBufferSource();
      noise.buffer = buffer;

      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(3200, now);
      filter.frequency.exponentialRampToValueAtTime(700, now + 0.22);
      filter.Q.value = 1.2;

      const rumbleOsc = ctx.createOscillator();
      rumbleOsc.type = 'sawtooth';
      rumbleOsc.frequency.setValueAtTime(220, now);
      rumbleOsc.frequency.exponentialRampToValueAtTime(120, now + 0.20);

      const noiseGain = ctx.createGain();
      noiseGain.gain.setValueAtTime(0.0001, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.8, now + 0.012);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.52);

      const rumbleGain = ctx.createGain();
      rumbleGain.gain.setValueAtTime(0.0001, now);
      rumbleGain.gain.exponentialRampToValueAtTime(0.12, now + 0.01);
      rumbleGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.42);

      noise.connect(filter);
      filter.connect(noiseGain);
      noiseGain.connect(ctx.destination);

      rumbleOsc.connect(rumbleGain);
      rumbleGain.connect(ctx.destination);

      noise.start(now);
      noise.stop(now + 0.55);

      rumbleOsc.start(now);
      rumbleOsc.stop(now + 0.75);
    }

    function resetGame() {
      player.x = 140;
      items = [];
      particles = [];
      score = 0;
      spawnTimer = 0;
      bgOffset = 0;
      cloudOffset = 0;
      gameOver = false;
      pressActive = false;
      updateScoreUI();
    }

    function updateScoreUI() {
      scoreEl.textContent = Math.floor(score);
      highScoreEl.textContent = Math.floor(highScore);
    }

    function startGame() {
      unlockAudio();
      resetGame();
      gameStarted = true;
      overlay.classList.add('hidden');
      tryPlayBgm();
    }

    function endGame(message = `今回のスコア: <span class="highlight">${Math.floor(score)}</span><br>もう一度挑戦！`) {
      gameOver = true;
      highScore = Math.max(highScore, Math.floor(score));
      updateScoreUI();
      showOverlay('Game Over', message, 'リスタート');
    }

    function showOverlay(title, message, buttonText) {
      overlay.innerHTML = `
        <div class="overlay-card">
          <h1>${title}</h1>
          <p>${message}</p>
          <p>押している間は右へ、離すと左へ移動するよ。</p>
          <button id="start-btn" type="button">${buttonText}</button>
        </div>
      `;
      overlay.classList.remove('hidden');
      const newStartBtn = overlay.querySelector('#start-btn');
      newStartBtn.addEventListener('click', startGame, { once: true });
    }

    function tryPlayBgm() {
      if (!soundEnabled) return;
      bgm.volume = 0.55;
      const p = bgm.play();
      if (p && typeof p.catch === 'function') {
        p.catch(() => {});
      }
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      soundBtn.textContent = soundEnabled ? 'SOUND ON' : 'SOUND OFF';
      if (soundEnabled) unlockAudio();
      if (soundEnabled && gameStarted && !gameOver) {
        tryPlayBgm();
      } else {
        bgm.pause();
      }
    }

    function randomBaseItemType() {
      const r = Math.random();
      if (r < 0.45) return 'bone';
      if (r < 0.75) return 'burger';
      return 'chili';
    }

    function spawnItem() {
      let type = randomBaseItemType();
      const specialRoll = Math.random();

      if (specialRoll < WORLD.goldenCoinChance) {
        type = 'coin';
      } else if (specialRoll < WORLD.goldenCoinChance + WORLD.brickChance) {
        type = 'brick';
      }

      const sizeMap = { bone: 78, burger: 95, chili: 74, coin: 68, brick: 92 };
      const size = sizeMap[type] || 80;
      const padding = 36;
      const x = randomRange(padding, WORLD.width - padding - size);

      const fallBonus = Math.floor(score / 40);

      items.push({
        type,
        x,
        y: -size - 20,
        w: size,
        h: size,
        vy: WORLD.itemFallBase + fallBonus + randomRange(-30, 70),
        rotation: randomRange(-0.2, 0.2),
      });
    }

    function update(dt) {
      if (!gameStarted || gameOver) return;

      spawnTimer += dt;
      bgOffset = (bgOffset + 45 * dt) % WORLD.width;
      cloudOffset = (cloudOffset + 80 * dt) % WORLD.width;

      if (pressActive) {
        player.x += WORLD.moveRightSpeed * dt;
      } else {
        player.x -= WORLD.moveLeftSpeed * dt;
      }
      player.x = clamp(player.x, 20, WORLD.width - player.w - 20);

      const spawnRateBonus = Math.min(0.24, Math.floor(score / 2000) * 0.03);
      const currentSpawnInterval = Math.max(0.28, WORLD.spawnInterval - spawnRateBonus);
      if (spawnTimer >= currentSpawnInterval) {
        spawnTimer = 0;
        spawnItem();
      }

      const playerRect = getPlayerRect();

      for (let i = items.length - 1; i >= 0; i--) {
        const item = items[i];
        item.y += item.vy * dt;
        item.rotation += dt * 0.9;

        const itemRect = { x: item.x, y: item.y, w: item.w, h: item.h };
        if (rectHit(playerRect, itemRect)) {
          if (ITEM_TYPES[item.type].deadly) {
            burst(item.x + item.w / 2, item.y + item.h / 2, 20, '#ffcf70');
            playCrashSound();
            endGame('レンガにぶつかった！<br><span class="highlight">ゲームオーバー</span>');
            return;
          }

          score = Math.max(0, score + ITEM_TYPES[item.type].score);
          highScore = Math.max(highScore, Math.floor(score));
          updateScoreUI();

          burst(
            item.x + item.w / 2,
            item.y + item.h / 2,
            item.type === 'coin' ? 18 : 12,
            item.type === 'coin' ? '#ffe07a' : '#ffffff'
          );

          if (item.type === 'coin') {
            playCoinCatchSound();
          } else {
            playItemCatchSound(item.type);
          }

          items.splice(i, 1);
          continue;
        }

        if (item.y > WORLD.floorY + 30) {
          if (ITEM_TYPES[item.type].mustCatch) {
            burst(item.x + item.w / 2, WORLD.floorY - 10, 24, '#ffe07a');
            playCrashSound();
            endGame('BRIOを落としてしまった！<br><span class="highlight">ゲームオーバー</span>');
            return;
          }
          items.splice(i, 1);
        }
      }

      score += dt * 8;
      highScore = Math.max(highScore, Math.floor(score));
      updateScoreUI();

      particles.forEach((p) => {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 900 * dt;
        p.life -= dt;
      });
      particles = particles.filter((p) => p.life > 0);
    }

    function getPlayerRect() {
      return {
        x: player.x + player.w * 0.16,
        y: player.y + player.h * 0.18,
        w: player.w * 0.68,
        h: player.h * 0.64,
      };
    }

    function rectHit(a, b) {
      return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
      );
    }

    function burst(x, y, count, color = '#fff3b0') {
      for (let i = 0; i < count; i++) {
        particles.push({
          x,
          y,
          vx: randomRange(-240, 240),
          vy: randomRange(-360, 40),
          r: randomRange(4, 11),
          life: randomRange(0.28, 0.7),
          color,
        });
      }
    }

    function draw() {
      ctx.clearRect(0, 0, WORLD.width, WORLD.height);
      drawBackground();
      drawGround();
      drawItems();
      drawPlayer();
      drawParticles();
      if (!gameStarted) drawTapHint();
    }

    function drawBackground() {
      const sky = ctx.createLinearGradient(0, 0, 0, WORLD.height);
      sky.addColorStop(0, '#7fd6ff');
      sky.addColorStop(0.58, '#c9f4ff');
      sky.addColorStop(1, '#f3fff2');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, WORLD.width, WORLD.height);

      for (let i = -1; i <= 2; i++) {
        drawCloudBand(i * 350 - cloudOffset * 0.8, 140, 0.2);
        drawCloudBand(i * 410 - cloudOffset, 255, 0.28);
      }

      for (let i = -1; i <= 2; i++) {
        drawHill(i * WORLD.width - bgOffset, 920, 210, '#a9e58f');
        drawHill(i * WORLD.width - bgOffset + 230, 970, 175, '#88d069');
      }
    }

    function drawCloudBand(x, y, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#ffffff';
      for (let i = 0; i < 5; i++) {
        const cx = x + i * 145;
        ctx.beginPath();
        ctx.arc(cx, y, 38, 0, Math.PI * 2);
        ctx.arc(cx + 34, y - 10, 32, 0, Math.PI * 2);
        ctx.arc(cx + 62, y + 6, 28, 0, Math.PI * 2);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    function drawHill(x, y, h, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(x, WORLD.height);
      ctx.quadraticCurveTo(x + WORLD.width * 0.25, y - h, x + WORLD.width * 0.5, WORLD.height);
      ctx.quadraticCurveTo(x + WORLD.width * 0.75, y - h * 0.55, x + WORLD.width, WORLD.height);
      ctx.closePath();
      ctx.fill();
    }

    function drawGround() {
      ctx.fillStyle = '#4ca246';
      ctx.fillRect(0, WORLD.floorY, WORLD.width, WORLD.height - WORLD.floorY);
      ctx.fillStyle = '#3a8836';
      for (let i = -1; i <= 8; i++) {
        const x = ((i * 120) - (bgOffset * 1.6)) % (WORLD.width + 160);
        ctx.fillRect(x, WORLD.floorY + 18, 82, 12);
      }
    }

    function drawItems() {
      for (const item of items) {
        ctx.save();
        ctx.translate(item.x + item.w / 2, item.y + item.h / 2);
        ctx.rotate(item.rotation);
        const img = images[item.type];
        if (img.complete && img.naturalWidth > 0) {
          ctx.drawImage(img, -item.w / 2, -item.h / 2, item.w, item.h);
        } else {
          fallbackItem(item.type, item.w, item.h);
        }
        ctx.restore();
      }
    }

    function fallbackItem(type, w, h) {
      if (type === 'bone') {
        ctx.fillStyle = '#fff5dd';
        ctx.fillRect(-w * 0.22, -h * 0.1, w * 0.44, h * 0.2);
        ctx.beginPath();
        ctx.arc(-w * 0.24, -h * 0.12, h * 0.12, 0, Math.PI * 2);
        ctx.arc(-w * 0.24, h * 0.12, h * 0.12, 0, Math.PI * 2);
        ctx.arc(w * 0.24, -h * 0.12, h * 0.12, 0, Math.PI * 2);
        ctx.arc(w * 0.24, h * 0.12, h * 0.12, 0, Math.PI * 2);
        ctx.fill();
      } else if (type === 'burger') {
        ctx.fillStyle = '#f0c26d';
        ctx.beginPath();
        ctx.ellipse(0, -h * 0.12, w * 0.36, h * 0.2, 0, Math.PI, 0);
        ctx.fill();
        ctx.fillRect(-w * 0.32, -h * 0.02, w * 0.64, h * 0.11);
        ctx.fillStyle = '#6a3925';
        ctx.fillRect(-w * 0.3, h * 0.02, w * 0.6, h * 0.12);
        ctx.fillStyle = '#86c66d';
        ctx.fillRect(-w * 0.28, -h * 0.01, w * 0.56, h * 0.05);
      } else if (type === 'chili') {
        ctx.fillStyle = '#e53e3e';
        ctx.beginPath();
        ctx.ellipse(0, 0, w * 0.34, h * 0.18, -0.4, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#2f8a3e';
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(-w * 0.1, -h * 0.05);
        ctx.quadraticCurveTo(-w * 0.22, -h * 0.22, -w * 0.04, -h * 0.28);
        ctx.stroke();
      } else if (type === 'coin') {
        ctx.fillStyle = '#ffd34d';
        ctx.beginPath();
        ctx.arc(0, 0, w * 0.32, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#fff2a8';
        ctx.lineWidth = 6;
        ctx.stroke();
      } else if (type === 'brick') {
        ctx.fillStyle = '#ba5d3f';
        ctx.fillRect(-w * 0.36, -h * 0.24, w * 0.72, h * 0.48);
        ctx.strokeStyle = '#8b3923';
        ctx.lineWidth = 4;
        ctx.strokeRect(-w * 0.36, -h * 0.24, w * 0.72, h * 0.48);
      }
    }

    function drawPlayer() {
      if (playerImg.complete && playerImg.naturalWidth > 0) {
        ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);
      } else {
        ctx.save();
        ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
        ctx.fillStyle = '#fff3d6';
        ctx.beginPath();
        ctx.ellipse(0, 10, 56, 48, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#f4d7a2';
        ctx.beginPath();
        ctx.arc(-18, -8, 20, 0, Math.PI * 2);
        ctx.arc(18, -6, 18, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#5b4635';
        ctx.beginPath();
        ctx.arc(-26, -34, 12, 0, Math.PI * 2);
        ctx.arc(20, -30, 10, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.save();
        ctx.globalAlpha = clamp(p.life / 0.7, 0, 1);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawTapHint() {
      ctx.save();
      ctx.globalAlpha = 0.12;
      ctx.fillStyle = '#000';
      ctx.font = '700 44px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('HOLD = RIGHT / RELEASE = LEFT', WORLD.width / 2, WORLD.height - 150);
      ctx.restore();
    }

    function loop(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const dt = Math.min((timestamp - lastTime) / 1000, WORLD.maxDelta);
      lastTime = timestamp;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    function setPressState(isPressed) {
      const wasPressed = pressActive;
      pressActive = isPressed;

      if (isPressed) unlockAudio();

      if (isPressed && !wasPressed && soundEnabled && gameStarted && !gameOver) {
        playJumpSound();
      }

      if (isPressed && soundEnabled && gameStarted && !gameOver && bgm.paused) {
        tryPlayBgm();
      }
    }

    function bindControls() {
      const shell = document.getElementById('game-shell');
      const isUiButton = (target) => !!(target && (target.closest('#sound-btn') || target.closest('#start-btn')));

      shell.addEventListener('touchstart', (e) => {
        if (isUiButton(e.target)) return;
        e.preventDefault();
      }, { passive: false });

      shell.addEventListener('touchmove', (e) => {
        if (isUiButton(e.target)) return;
        e.preventDefault();
      }, { passive: false });

      shell.addEventListener('touchend', (e) => {
        if (isUiButton(e.target)) return;
        e.preventDefault();
      }, { passive: false });

      shell.addEventListener('pointerdown', (e) => {
        if (isUiButton(e.target)) return;
        e.preventDefault();
        setPressState(true);
      }, { passive: false });

      shell.addEventListener('pointermove', (e) => {
        if (pressActive) e.preventDefault();
      }, { passive: false });

      window.addEventListener('pointerup', () => setPressState(false));
      window.addEventListener('pointercancel', () => setPressState(false));
      window.addEventListener('blur', () => setPressState(false));

      shell.addEventListener('contextmenu', (e) => e.preventDefault());
      canvas.addEventListener('contextmenu', (e) => e.preventDefault());
      document.addEventListener('contextmenu', (e) => {
        if (shell.contains(e.target)) e.preventDefault();
      });
      document.addEventListener('selectstart', (e) => {
        if (shell.contains(e.target)) e.preventDefault();
      });
    }

    soundBtn.addEventListener('click', toggleSound);
    document.getElementById('start-btn').addEventListener('click', startGame, { once: true });

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function randomRange(min, max) {
      return Math.random() * (max - min) + min;
    }

    bindControls();
    updateScoreUI();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
